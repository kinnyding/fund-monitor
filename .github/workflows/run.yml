name: Fund Monitor
on:
  schedule:
    - cron: "*/5 9-15 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python fund_monitor.py
      - run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/ || true
          git commit -m "Update fund data $(date '+%H:%M')" || true
          git push
