name: Fund Monitor

# 触发条件：手动触发 + 交易日9:00-15:00每5分钟自动运行
on:
  workflow_dispatch:
  schedule:
    # UTC时间1:00-7:00 = 北京时间9:00-15:00，周一到周五
    - cron: '*/5 1-7 * * 1-5'

# 强制Node.js 24，彻底消除黄色弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v6

      # 2. 安装Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # 3. 升级pip
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # 4. 安装依赖（只需要requests，精简高效）
      - name: Install dependencies
        run: pip install requests

      # 5. 运行监控脚本
      - name: Run fund monitor
        run: python fund_monitor.py
